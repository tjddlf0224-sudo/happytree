<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>해피트리 가계도</title>
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="해피트리">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
:root {
  --teal:      #2bbcd4;
  --teal-dk:   #1a9ab0;
  --teal-lt:   #e8f8fb;
  --teal-mid:  #b3e8f0;
  --male:      #5ab4d6;
  --female:    #e8748a;
  --dead:      #9e9e9e;
  --self-ring: #ff9500;
  --text:      #333;
  --sub:       #888;
  --bg:        #eef8fb;
  --white:     #fff;
  --border:    #cceaf0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;touch-action:none;}

#header{background:var(--teal);padding:11px 16px;display:flex;align-items:center;gap:10px;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:20;}
#header .logo{font-size:26px;}
#header h1{font-size:20px;font-weight:700;letter-spacing:.5px;}
#hdr-btns{margin-left:auto;display:flex;gap:6px;}
#hdr-btns button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 14px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;}
#hdr-btns button:hover{background:rgba(255,255,255,.35);}

#tab-bar{background:var(--white);border-bottom:1px solid var(--border);display:flex;flex-shrink:0;z-index:15;}
.tab-btn{flex:1;padding:15px 4px;border:none;background:none;font-size:16px;font-weight:700;color:var(--sub);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);}

#main{flex:1;position:relative;overflow:hidden;}
#tree-svg{width:100%;height:100%;cursor:grab;display:block;}
#tree-svg:active{cursor:grabbing;}

#empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--sub);pointer-events:none;gap:12px;}
#empty-state .ei{font-size:56px;}
#empty-state p{font-size:14px;line-height:1.9;text-align:center;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:20px 18px 44px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:slideUp .22s ease;position:relative;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 18px;}
.modal h2{font-size:19px;font-weight:700;color:var(--teal-dk);margin-bottom:16px;text-align:center;}

.form-group{margin-bottom:13px;}
.form-group label{display:block;font-size:13px;font-weight:700;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.form-group input,.form-group select{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:16px;color:var(--text);background:#fafeff;outline:none;font-family:inherit;}
.form-group input:focus,.form-group select:focus{border-color:var(--teal);background:#fff;}

.gender-btns{display:flex;gap:8px;}
.gender-btn{flex:1;padding:13px;border:2px solid var(--border);border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;background:#fafeff;color:var(--sub);transition:all .15s;text-align:center;touch-action:manipulation;}
.gender-btn.sel-m{border-color:var(--male);background:#e4f4ff;color:var(--male);}
.gender-btn.sel-f{border-color:var(--female);background:#fff0f3;color:var(--female);}

.rel-label{background:var(--teal-lt);border-radius:10px;padding:9px 14px;margin-bottom:14px;font-size:13px;color:var(--teal-dk);font-weight:600;text-align:center;}

.self-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fffbe6;border:1.5px solid #ffd34e;border-radius:10px;margin-bottom:13px;}
.self-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--self-ring);flex-shrink:0;}
.self-row label{font-size:15px;font-weight:600;color:#a07000;cursor:pointer;user-select:none;}

.dead-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f5f5f5;border:1.5px solid #bdbdbd;border-radius:10px;margin-bottom:13px;}
.dead-row input[type=checkbox]{width:20px;height:20px;accent-color:#616161;flex-shrink:0;}
.dead-row label{font-size:15px;font-weight:600;color:#616161;cursor:pointer;user-select:none;}

.modal-footer{display:flex;gap:10px;margin-top:20px;}
.btn-full{flex:1;padding:15px;border-radius:14px;font-size:17px;font-weight:700;border:none;cursor:pointer;touch-action:manipulation;}
.btn-ok{background:var(--teal);color:#fff;}
.btn-ok:hover{background:var(--teal-dk);}
.btn-no{background:#f0f0f0;color:#888;flex:.6;}

.btn-del-top{display:none;position:absolute;top:-20px;left:50%;transform:translateX(-50%);background:#ff4757;color:#fff;border:3px solid #fff;border-radius:50%;width:46px;height:46px;font-size:18px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(255,71,87,.45);z-index:10;touch-action:manipulation;transition:transform .15s,background .15s;}
.btn-del-top:hover{background:#c0392b;transform:translateX(-50%) scale(1.1);}
.btn-del-top.visible{display:flex;}

.rel-list-item{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--border);font-size:13px;}
.rel-list-item:last-child{border-bottom:none;}
.rel-list-item .rel-tag{background:var(--teal-lt);color:var(--teal-dk);border-radius:6px;padding:2px 7px;font-size:11px;font-weight:700;}
.rel-list-item .btn-unlink{margin-left:auto;background:none;border:none;color:#ff4757;font-size:16px;cursor:pointer;padding:0 4px;line-height:1;}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;padding:9px 22px;border-radius:24px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

#loading{position:fixed;inset:0;background:rgba(238,248,251,.88);display:flex;align-items:center;justify-content:center;z-index:200;font-size:15px;color:var(--teal-dk);font-weight:600;gap:12px;}
.spinner{width:30px;height:30px;border:4px solid var(--teal-mid);border-top-color:var(--teal);border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.photo-wrap{display:flex;align-items:center;gap:14px;padding:12px 14px;background:#f7fdff;border:1.5px dashed var(--border);border-radius:12px;margin-bottom:14px;cursor:pointer;transition:border-color .15s;position:relative;}
.photo-wrap:hover{border-color:var(--teal);}
.photo-thumb{width:54px;height:54px;border-radius:50%;object-fit:cover;border:2px solid var(--teal-mid);flex-shrink:0;}
.photo-icon{width:54px;height:54px;border-radius:50%;background:var(--teal-lt);border:2px solid var(--teal-mid);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.photo-info{flex:1;}
.photo-info .pi-main{font-size:13px;font-weight:600;color:var(--teal-dk);}
.photo-info .pi-sub{font-size:11px;color:var(--sub);margin-top:3px;}
.photo-clear{background:none;border:none;color:#bbb;font-size:20px;cursor:pointer;padding:4px;line-height:1;flex-shrink:0;border-radius:50%;}
.photo-clear:hover{color:#ff4757;background:#fff0f0;}

.order-row{display:flex;align-items:center;gap:10px;}
.order-btn{flex:1;padding:11px;border:2px solid var(--teal);border-radius:10px;font-size:14px;font-weight:700;color:var(--teal);background:#f0fbfd;cursor:pointer;touch-action:manipulation;}
.order-btn:active{background:var(--teal);color:#fff;}
#mm-order-label{flex:1;text-align:center;font-size:16px;font-weight:700;color:var(--text);}

#cache-badge{position:fixed;bottom:14px;left:14px;background:rgba(0,0,0,.6);color:#fff;padding:5px 12px;border-radius:14px;font-size:11px;z-index:50;opacity:0;transition:opacity .4s;pointer-events:none;}
#cache-badge.show{opacity:1;}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><span>가계도 불러오는 중…</span></div>
<div id="cache-badge"></div>

<div id="header">
  <div class="logo">🌳</div>
  <h1>해피트리</h1>
  <div id="hdr-btns">
    <button onclick="openSelfModal()">나 설정</button>
    <button onclick="resetZoom()">전체보기</button>
  </div>
</div>

<div id="tab-bar">
  <button class="tab-btn active" onclick="switchTab('친가',this)">친가</button>
  <button class="tab-btn"       onclick="switchTab('외가',this)">외가</button>
  <button class="tab-btn"       onclick="switchTab('처가',this)">처가</button>
  <button class="tab-btn"       onclick="switchTab('처외가',this)">처외가</button>
</div>

<div id="main">
  <svg id="tree-svg"><g id="canvas-g"></g></svg>
  <div id="empty-state">
    <div class="ei">🌱</div>
    <p>아직 가계도가 없어요.<br>인물의 육각형을 눌러 관계를 추가하거나<br>빈 곳을 <strong>길게 눌러</strong> 추가하세요!</p>
  </div>
</div>

<div class="modal-overlay" id="member-modal">
  <div class="modal">
    <button class="btn-del-top" id="mm-btn-del" onclick="deleteFromModal()" title="삭제">🗑</button>
    <div class="modal-handle"></div>
    <h2 id="mm-title">인물 추가</h2>
    <input type="hidden" id="mm-id">
    <input type="hidden" id="mm-rel-type">
    <input type="hidden" id="mm-rel-target">
    <div id="mm-rel-label" class="rel-label" style="display:none"></div>

    <input type="file" id="mm-photo-file" accept="image/*" style="display:none">
    <div class="photo-wrap" id="mm-photo-wrap">
      <div class="photo-icon" id="mm-photo-icon">📷</div>
      <img class="photo-thumb" id="mm-photo-thumb" style="display:none" alt="">
      <div class="photo-info">
        <div class="pi-main" id="mm-photo-main">사진 추가</div>
        <div class="pi-sub">탭해서 갤러리에서 선택 · JPG, PNG</div>
      </div>
      <button class="photo-clear" id="mm-photo-clear" style="display:none">✕</button>
    </div>

    <div class="form-group">
      <label>이름</label>
      <input type="text" id="mm-name" placeholder="홍길동" autocomplete="off">
    </div>
    <div class="form-group">
      <label>성별</label>
      <div class="gender-btns">
        <button class="gender-btn sel-m" id="gbtn-m" onclick="selGender('male')">👨 남성</button>
        <button class="gender-btn"       id="gbtn-f" onclick="selGender('female')">👩 여성</button>
      </div>
    </div>
    <div class="form-group">
      <label>출생년도 (나이 자동계산)</label>
      <input type="number" id="mm-birth" placeholder="예: 1960" min="1" max="2099">
    </div>

    <div class="dead-row">
      <input type="checkbox" id="mm-dead">
      <label for="mm-dead">✝ 고인 (사망)</label>
    </div>

    <div class="form-group">
      <label>메모 (직업·출신지 등)</label>
      <input type="text" id="mm-note" placeholder="예: 경기도 수원">
    </div>

    <div class="form-group" id="mm-spouse-group" style="display:none">
      <label>배우자</label>
      <select id="mm-spouse-select"><option value="">— 없음 —</option></select>
    </div>

    <div class="form-group" id="mm-order-group" style="display:none">
      <label>형제 순서 (왼쪽 = 손윗사람)</label>
      <div class="order-row">
        <button class="order-btn" onclick="shiftOrder(-1)">◀ 앞으로</button>
        <span id="mm-order-label">1번째</span>
        <button class="order-btn" onclick="shiftOrder(1)">뒤로 ▶</button>
      </div>
    </div>

    <div class="self-row">
      <input type="checkbox" id="mm-self">
      <label for="mm-self">⭐ 이 인물이 "나 (ME)" 입니다</label>
    </div>

    <div id="mm-rel-section" style="display:none">
      <div style="font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">현재 연결된 관계</div>
      <div id="mm-rel-list"></div>
    </div>

    <div class="modal-footer">
      <button class="btn-full btn-no" onclick="closeMemberModal()">취소</button>
      <button class="btn-full btn-ok" onclick="saveMember()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// 상수
// ══════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwSgQmPUGCiYuXuIU7ELZEfOrETvKEMueagFccS3XOqcwWIz2R8B6LNO6diMn2xIBB6/exec';
const TABS = ['친가','외가','처가','처외가'];

// ══════════════════════════════════════════════════
// 캐시
// ══════════════════════════════════════════════════
const CACHE_KEY    = 'happytree_v1_data';
const CACHE_TS_KEY = 'happytree_v1_ts';
const CACHE_TTL    = 10 * 60 * 1000;

function saveCache(data){ try{ localStorage.setItem(CACHE_KEY,JSON.stringify(data)); localStorage.setItem(CACHE_TS_KEY,String(Date.now())); }catch(e){} }
function loadCache(){ try{ const ts=parseInt(localStorage.getItem(CACHE_TS_KEY)||'0',10); const raw=localStorage.getItem(CACHE_KEY); if(!raw||Date.now()-ts>CACHE_TTL) return null; return JSON.parse(raw); }catch(e){ return null; } }
function clearCache(){ localStorage.removeItem(CACHE_KEY); localStorage.removeItem(CACHE_TS_KEY); }
function showCacheBadge(msg){ const el=document.getElementById('cache-badge'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2600); }

// ══════════════════════════════════════════════════
// 레이아웃 상수
// ══════════════════════════════════════════════════
function isMobile(){ return window.innerWidth<=480; }
const HR=38, CG=12, HG=52, VG=130, LH=50, RAD_R=80;

// ══════════════════════════════════════════════════
// 전역 상태
// ══════════════════════════════════════════════════
const mkTab=()=>({members:[],relations:[]});
const S={
  tab:'친가',
  data:Object.fromEntries(TABS.map(t=>[t,mkTab()])),
  selfId:Object.fromEntries(TABS.map(t=>[t,null])),
  gender:'male',
  svg:null, zoom:null,
};

// ══════════════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async()=>{
  initD3();
  const cached=loadCache();
  if(cached){
    applyData(cached);
    hideLoading();
    showCacheBadge('💾 캐시에서 로드됨');
    renderTree(); autoFit();
    loadDataBg();
  } else {
    await loadData();
    hideLoading();
  }
  setTimeout(autoFit,100);
  setTimeout(autoFit,500);
  setTimeout(autoFit,1000);
});

window.addEventListener('orientationchange',()=>setTimeout(autoFit,300));
window.addEventListener('resize',()=>{ clearTimeout(window._rzt); window._rzt=setTimeout(autoFit,200); });

function initD3(){
  S.svg=d3.select('#tree-svg');
  S.zoom=d3.zoom()
    .scaleExtent([0.05,5])
    .filter(ev=>{ if(ev.type==='touchstart') return ev.touches.length>=2; return !ev.button; })
    .on('zoom',e=>d3.select('#canvas-g').attr('transform',e.transform));
  S.svg.call(S.zoom);
  S.svg.on('click',()=>closeMenu());

  // 빈 곳 길게 누르기 → 인물 추가
  let pt=null;
  S.svg.on('touchstart.lp',function(ev){
    if(ev.touches.length!==1) return;
    pt=setTimeout(()=>openAddModal(null,null,null),600);
  });
  S.svg.on('touchend.lp touchmove.lp',function(){ clearTimeout(pt); pt=null; });
}

function applyData(res){
  const allM=res.members||[], allR=res.relations||[];
  TABS.forEach(tab=>{
    S.data[tab].members  =allM.filter(m=>(m.tab||'친가')===tab);
    S.data[tab].relations=allR.filter(r=>(r.tab||'친가')===tab);
    const self=S.data[tab].members.find(m=>m.isSelf==='true'||m.isSelf===true);
    if(self) S.selfId[tab]=self.id;
  });
}

async function loadData(){
  try{
    const res=await api({action:'getAll'});
    applyData(res); saveCache(res); renderTree(); autoFit();
  }catch(err){ showToast('데이터 로드 실패: '+(err.message||'서버 오류'),5000); }
}

async function loadDataBg(){
  try{
    const res=await api({action:'getAll'});
    const newStr=JSON.stringify(res);
    const cached=loadCache();
    const oldStr=cached?JSON.stringify(cached):'';
    saveCache(res);
    if(newStr!==oldStr){ applyData(res); renderTree(); autoFit(); showCacheBadge('🔄 최신 데이터로 갱신됨'); }
  }catch(e){}
}

// ══════════════════════════════════════════════════
// 탭
// ══════════════════════════════════════════════════
function switchTab(tab,el){
  S.tab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  closeMenu(); renderTree();
}

// ══════════════════════════════════════════════════
// 렌더링
// ══════════════════════════════════════════════════
function renderTree(){
  const g=d3.select('#canvas-g');
  g.selectAll('*').remove();
  closeMenu();

  const {members,relations}=S.data[S.tab];
  const emEl=document.getElementById('empty-state');
  if(!members.length){ emEl.style.display='flex'; return; }
  emEl.style.display='none';

  const mMap=Object.fromEntries(members.map(m=>[m.id,m]));

  // ── 인덱스 구성 (sibling 완전 무시) ──────────────
  const spouseOf={};
  const kidsOf={};   // parentId → Set<childId>

  relations.forEach(r=>{
    if(r.relationType==='spouse'){
      spouseOf[r.person1Id]=r.person2Id;
      spouseOf[r.person2Id]=r.person1Id;
    }
    if(r.relationType==='parent-child'){
      if(!kidsOf[r.person1Id]) kidsOf[r.person1Id]=new Set();
      kidsOf[r.person1Id].add(r.person2Id);
    }
    // sibling → 완전 무시. parent-child로만 트리 구성
  });

  // ── BFS 세대 배정 ────────────────────────────────
  // 부모가 없는 노드(= 자식 관계에서 person2로 등장하지 않는 노드)를 루트로
  const childIds=new Set(
    relations.filter(r=>r.relationType==='parent-child').map(r=>r.person2Id)
  );

  // 배우자도 같은 레벨 → 배우자 중 childId가 아닌 쪽도 루트 후보
  let roots=members.filter(m=>!childIds.has(m.id));
  if(!roots.length) roots=[members[0]];

  const levelOf={};
  const visited=new Set();

  function allKids(id){
    const s=new Set([...(kidsOf[id]||[])]);
    const sp=spouseOf[id];
    if(sp)(kidsOf[sp]||[]).forEach(c=>s.add(c));
    return [...s];
  }

  function bfs(startId,lv){
    const q=[[startId,lv]];
    while(q.length){
      const [id,l]=q.shift();
      if(visited.has(id)) continue;
      visited.add(id);
      // 더 얕은(작은) 레벨이 이미 배정됐으면 갱신 안 함
      if(levelOf[id]===undefined || l<levelOf[id]) levelOf[id]=l;
      const sp=spouseOf[id];
      if(sp&&!visited.has(sp)){ visited.add(sp); levelOf[sp]=l; }
      allKids(id).forEach(c=>{ if(!visited.has(c)) q.push([c,l+1]); });
    }
  }

  // 루트 이름순 정렬 후 BFS
  roots.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));
  roots.forEach(r=>bfs(r.id,0));

  // 미방문 노드 처리
  members.forEach(m=>{
    if(levelOf[m.id]!==undefined) return;
    const pr=relations.find(r=>r.relationType==='parent-child'&&r.person2Id===m.id);
    levelOf[m.id]=(pr&&levelOf[pr.person1Id]!==undefined)?levelOf[pr.person1Id]+1:0;
  });

  // 레벨 정규화 (최솟값 → 0)
  const minLv=Math.min(...Object.values(levelOf));
  if(minLv!==0) members.forEach(m=>{ levelOf[m.id]-=minLv; });

  const levels=[...new Set(Object.values(levelOf))].sort((a,b)=>a-b);
  const maxLv=levels.length?Math.max(...levels):0;

  // ── pair 구성 ─────────────────────────────────────
  // order 오름차순 → 왼쪽(손윗사람)
  const pairDone=new Set();
  function pairW(p){ return p.isCouple?(HR*4+CG):HR*2; }
  const pairsOf={};

  levels.forEach(lv=>{
    const ids=members
      .filter(m=>levelOf[m.id]===lv)
      .sort((a,b)=>{
        const oa=(a.order!=null&&a.order!=='')?Number(a.order):99999;
        const ob=(b.order!=null&&b.order!=='')?Number(b.order):99999;
        return oa!==ob?oa-ob:members.indexOf(a)-members.indexOf(b);
      })
      .map(m=>m.id);

    const pairs=[];
    ids.forEach(id=>{
      if(pairDone.has(id)) return;
      const sp=spouseOf[id];
      if(sp&&levelOf[sp]===lv&&!pairDone.has(sp)){
        // 남편 왼쪽, 아내 오른쪽
        const left=(mMap[id]?.gender==='male')?id:sp;
        const right=(left===id)?sp:id;
        pairs.push({left,right,isCouple:true});
        pairDone.add(id); pairDone.add(sp);
      } else {
        pairs.push({left:id,right:null,isCouple:false});
        pairDone.add(id);
      }
    });
    pairsOf[lv]=pairs;
  });

  // ── X 좌표 계산 ───────────────────────────────────
  const pairCX=new Map();

  // 초기 배치
  levels.forEach(lv=>{
    const ps=pairsOf[lv]||[];
    const tw=ps.reduce((s,p)=>s+pairW(p),0)+HG*Math.max(ps.length-1,0);
    let cx=-tw/2;
    ps.forEach(p=>{ pairCX.set(p.left,cx+pairW(p)/2); cx+=pairW(p)+HG; });
  });

  // 아래→위: 부모를 자녀 중앙으로
  for(let lv=maxLv-1;lv>=0;lv--){
    (pairsOf[lv]||[]).forEach(pair=>{
      const kids=directKids(pair.left,pair.isCouple?pair.right:null,lv);
      if(!kids.length) return;
      const xs=kids.map(c=>{
        const cp=(pairsOf[lv+1]||[]).find(p=>p.left===c||p.right===c);
        return cp?pairCX.get(cp.left):null;
      }).filter(x=>x!==null);
      if(xs.length) pairCX.set(pair.left,xs.reduce((a,b)=>a+b,0)/xs.length);
    });
    resolveOverlap(lv);
  }
  // 위→아래: 간격 재보정
  for(let lv=1;lv<=maxLv;lv++) resolveOverlap(lv);

  function resolveOverlap(lv){
    const sorted=[...(pairsOf[lv]||[])].sort((a,b)=>(pairCX.get(a.left)||0)-(pairCX.get(b.left)||0));
    for(let i=1;i<sorted.length;i++){
      const prev=sorted[i-1],cur=sorted[i];
      const minX=(pairCX.get(prev.left)||0)+pairW(prev)/2+HG+pairW(cur)/2;
      if((pairCX.get(cur.left)||0)<minX) pairCX.set(cur.left,minX);
    }
  }

  // nodePos 확정
  const nodePos={};
  members.forEach(m=>{ nodePos[m.id]={x:0,y:levelOf[m.id]*(HR*2+LH+VG)}; });
  levels.forEach(lv=>{
    (pairsOf[lv]||[]).forEach(pair=>{
      const cx=pairCX.get(pair.left)||0;
      if(pair.isCouple){
        nodePos[pair.left].x =cx-HR-CG/2;
        nodePos[pair.right].x=cx+HR+CG/2;
      } else {
        nodePos[pair.left].x=cx;
      }
    });
  });

  // 헬퍼
  function directKids(repId,sp,lv){
    const s=new Set();
    [...(kidsOf[repId]||[])].forEach(c=>{ if((levelOf[c]??-1)===lv+1) s.add(c); });
    if(sp)[...(kidsOf[sp]||[])].forEach(c=>{ if((levelOf[c]??-1)===lv+1) s.add(c); });
    return [...s];
  }

  // ── 링크 그리기 ───────────────────────────────────
  const linkG=g.append('g').attr('class','links');

  // 부부선
  relations.filter(r=>r.relationType==='spouse').forEach(r=>{
    const a=nodePos[r.person1Id],b=nodePos[r.person2Id];
    if(!a||!b) return;
    linkG.append('line')
      .attr('x1',Math.min(a.x,b.x)+HR*.75).attr('y1',a.y)
      .attr('x2',Math.max(a.x,b.x)-HR*.75).attr('y2',b.y)
      .attr('stroke','var(--teal)').attr('stroke-width',2).attr('stroke-linecap','round');
  });

  // 부모→자녀선
  levels.forEach(lv=>{
    (pairsOf[lv]||[]).forEach(pair=>{
      const sp=pair.isCouple?pair.right:null;
      const kids=directKids(pair.left,sp,lv);
      if(!kids.length) return;
      const cx=pairCX.get(pair.left)||0;
      const py=nodePos[pair.left].y+HR;
      const midY=py+VG*.4;

      linkG.append('line').attr('x1',cx).attr('y1',py).attr('x2',cx).attr('y2',midY)
        .attr('stroke','var(--teal)').attr('stroke-width',2).attr('stroke-linecap','round');

      const kidXs=kids.map(c=>nodePos[c]?.x).filter(x=>x!==undefined);
      if(kidXs.length>1)
        linkG.append('line')
          .attr('x1',Math.min(...kidXs)).attr('y1',midY)
          .attr('x2',Math.max(...kidXs)).attr('y2',midY)
          .attr('stroke','var(--teal)').attr('stroke-width',2).attr('stroke-linecap','round');

      kids.forEach(kid=>{
        const kx=nodePos[kid]?.x,ky=nodePos[kid]?.y-HR;
        if(kx===undefined) return;
        linkG.append('line').attr('x1',kx).attr('y1',midY).attr('x2',kx).attr('y2',ky)
          .attr('stroke','var(--teal)').attr('stroke-width',2).attr('stroke-linecap','round');
      });
    });
  });

  // ── 노드 그리기 ───────────────────────────────────
  const nodeG=g.append('g').attr('class','nodes');
  const selfId=S.selfId[S.tab];

  members.forEach(m=>{
    const p=nodePos[m.id];
    if(!p) return;
    const isSelf=m.id===selfId;
    const isDead=(m.isDead==='true'||m.isDead===true);
    const fill=isDead?'var(--dead)':isSelf?'var(--teal)':m.gender==='female'?'var(--female)':'var(--male)';

    const nG=nodeG.append('g')
      .attr('transform','translate('+p.x+','+p.y+')')
      .attr('data-id',m.id).style('cursor','pointer')
      .on('click',function(ev){ ev.stopPropagation(); openMenu(m.id,p.x,p.y); });

    if(isSelf){
      nG.append('polygon').attr('points',hexPts(HR+5))
        .attr('fill','none').attr('stroke','var(--self-ring)').attr('stroke-width',3);
    }

    nG.append('polygon').attr('points',hexPts(HR))
      .attr('fill',fill).attr('stroke','#fff').attr('stroke-width',2.5);

    if(isDead){
      nG.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('fill','rgba(255,255,255,0.75)').attr('font-size','26px').attr('pointer-events','none').text('✝');
    }

    if(isSelf){
      const bd=nG.append('g').attr('transform','translate('+(HR-1)+','+(-(HR-1))+')');
      bd.append('circle').attr('r',9).attr('fill','var(--self-ring)').attr('stroke','#fff').attr('stroke-width',1.5);
      bd.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('fill','#fff').attr('font-size','6px').attr('font-weight','700').attr('pointer-events','none').text('ME');
    }

    if(!isSelf&&selfId){
      const chon=computeChon(m.id,selfId,relations,spouseOf);
      if(chon!==null){
        const bd=nG.append('g').attr('transform','translate('+(-(HR-1))+','+(-(HR-1))+')');
        bd.append('circle').attr('r',9).attr('fill','#fff').attr('stroke','var(--teal)').attr('stroke-width',1.5);
        bd.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
          .attr('fill','var(--teal-dk)').attr('font-size','6.5px').attr('font-weight','700').attr('pointer-events','none')
          .text(chon===0?'배우자':chon+'촌');
      }
    }

    if(!isDead){
      if(m.photoFileId){
        const clipId='hclip_'+m.id.replace(/[^a-zA-Z0-9]/g,'_');
        nG.append('defs').append('clipPath').attr('id',clipId).append('polygon').attr('points',hexPts(HR-1));
        nG.append('image')
          .attr('href','https://lh3.googleusercontent.com/d/'+m.photoFileId+'=w120')
          .attr('x',-(HR-1)).attr('y',-(HR-1))
          .attr('width',(HR-1)*2).attr('height',(HR-1)*2)
          .attr('preserveAspectRatio','xMidYMid slice')
          .attr('clip-path','url(#'+clipId+')')
          .attr('pointer-events','none');
      } else {
        const iconG=nG.append('g').attr('pointer-events','none').attr('transform','translate(0,1)').attr('opacity','0.88');
        if(m.gender==='female'){
          iconG.append('circle').attr('cx',0).attr('cy',-11).attr('r',7).attr('fill','rgba(255,255,255,0.92)');
          iconG.append('rect').attr('x',-2.5).attr('y',-4.5).attr('width',5).attr('height',4).attr('rx',1).attr('fill','rgba(255,255,255,0.92)');
          iconG.append('path').attr('d','M -9 14 Q -8 -1 0 -1 Q 8 -1 9 14 Z').attr('fill','rgba(255,255,255,0.92)');
          iconG.append('rect').attr('x',-6).attr('y',-1).attr('width',12).attr('height',3.5).attr('rx',1.5).attr('fill','rgba(255,255,255,0.7)');
        } else {
          iconG.append('circle').attr('cx',0).attr('cy',-11).attr('r',7).attr('fill','rgba(255,255,255,0.92)');
          iconG.append('rect').attr('x',-2.5).attr('y',-4.5).attr('width',5).attr('height',3.5).attr('rx',1).attr('fill','rgba(255,255,255,0.92)');
          iconG.append('path').attr('d','M -10 14 L -8 -1 L 8 -1 L 10 14 Z').attr('fill','rgba(255,255,255,0.92)');
          iconG.append('rect').attr('x',-8).attr('y','-1').attr('width',16).attr('height',3.5).attr('rx',1.5).attr('fill','rgba(255,255,255,0.7)');
        }
      }
    }

    nG.append('text').attr('text-anchor','middle').attr('y',HR+18)
      .attr('fill',isDead?'#757575':'#222').attr('font-size','13px').attr('font-weight','700')
      .attr('pointer-events','none').text(clip(m.name||'(미입력)',6));

    const sub=buildSub(m);
    if(sub){
      nG.append('text').attr('text-anchor','middle').attr('y',HR+33)
        .attr('fill',isDead?'#9e9e9e':'#666').attr('font-size','11px').attr('pointer-events','none').text(sub);
    }
  });

  autoFit();
}

// 유틸
// ══════════════════════════════════════════════════
function hexPts(r){
  return Array.from({length:6},(_,i)=>{
    const a=Math.PI/180*(60*i-30);
    return (r*Math.cos(a))+','+(r*Math.sin(a));
  }).join(' ');
}
function clip(s,n){ return s.length>n?s.slice(0,n-1)+'…':s; }
function koreanAge(by,base){ const b=parseInt(by,10); if(!b||isNaN(b)) return null; return (base||new Date().getFullYear())-b+1; }
function buildSub(m){
  const p=[];
  if(m.note) p.push(m.note);
  const isDead=(m.isDead==='true'||m.isDead===true);
  if(m.birthYear){
    if(isDead){ p.push('고인'); }
    else{ const age=koreanAge(m.birthYear,new Date().getFullYear()); if(age!==null&&age>0) p.push(age+'세'); }
  }
  const s=p.join(' · ');
  return s.length>13?s.slice(0,12)+'…':s;
}
function computeChon(targetId,selfId,relations,spouseOf){
  if(!selfId||targetId===selfId) return null;
  if(spouseOf[selfId]===targetId) return 0;
  const adj={};
  relations.forEach(r=>{
    if(r.relationType==='parent-child'){
      if(!adj[r.person1Id]) adj[r.person1Id]=[];
      if(!adj[r.person2Id]) adj[r.person2Id]=[];
      adj[r.person1Id].push(r.person2Id);
      adj[r.person2Id].push(r.person1Id);
    }
  });
  const starts=[selfId];
  if(spouseOf[selfId]) starts.push(spouseOf[selfId]);
  const dist={};
  starts.forEach(s=>{ dist[s]=0; });
  const q=[...starts];
  while(q.length){
    const cur=q.shift();
    (adj[cur]||[]).forEach(nb=>{ if(dist[nb]===undefined){ dist[nb]=dist[cur]+1; q.push(nb); } });
  }
  let d=dist[targetId];
  if(d===undefined&&spouseOf[targetId]) d=dist[spouseOf[targetId]];
  if(d===undefined) return null;
  return d;
}

function autoFit(){
  function tryFit(n){
    const g=document.getElementById('canvas-g');
    const mainEl=document.getElementById('main');
    const sw=mainEl?mainEl.clientWidth:window.innerWidth;
    const sh=mainEl?mainEl.clientHeight:window.innerHeight-160;
    if((sw<10||sh<10)&&n>0){ setTimeout(()=>tryFit(n-1),150); return; }
    const bb=g.getBBox();
    if(!bb.width||!bb.height){ if(n>0) setTimeout(()=>tryFit(n-1),150); return; }
    const nc=S.data[S.tab].members.length;
    const pad=nc<=2?120:nc<=5?80:60;
    const maxSc=nc<=1?2.5:nc<=3?2.0:nc<=6?1.5:1.2;
    let sc=Math.min((sw-pad)/bb.width,(sh-pad)/bb.height,maxSc);
    if(sc<=0||!isFinite(sc)) sc=1.0;
    const tx=sw/2-sc*(bb.x+bb.width/2);
    const ty=sh/2-sc*(bb.y+bb.height/2);
    S.svg.call(S.zoom.transform,d3.zoomIdentity.translate(tx,ty).scale(sc));
  }
  requestAnimationFrame(()=>tryFit(8));
}
function resetZoom(){ autoFit(); }

const MENU_ITEMS=[
  {key:'spouse', label:'배우자',angle:0,  color:'#e74c3c'},
  {key:'child',  label:'자녀',  angle:60, color:'#2bbcd4'},
  {key:'sibling',label:'형제',  angle:120,color:'#9b59b6'},
  {key:'parent', label:'부모',  angle:180,color:'#3498db'},
  {key:'delete', label:'삭제',  angle:240,color:'#c0392b'},
];

function openMenu(id,nx,ny){
  closeMenu();
  const m=S.data[S.tab].members.find(x=>x.id===id);
  if(!m) return;
  const svgEl=document.getElementById('tree-svg');
  const tf=d3.zoomTransform(svgEl);
  const sw=svgEl.clientWidth||window.innerWidth;
  const sh=svgEl.clientHeight||window.innerHeight-160;
  const mr=RAD_R+28+20;
  let sx=Math.max(mr,Math.min(sw-mr,tf.applyX(nx)));
  let sy=Math.max(mr,Math.min(sh-mr,tf.applyY(ny)));
  const ax=(sx-tf.x)/tf.k, ay=(sy-tf.y)/tf.k;

  const menuG=d3.select('#canvas-g').append('g')
    .attr('class','radial-menu').attr('transform','translate('+ax+','+ay+')');
  menuG.append('circle').attr('r',RAD_R+38).attr('fill','rgba(0,0,0,.22)')
    .on('click',e=>{ e.stopPropagation(); closeMenu(); });

  MENU_ITEMS.forEach(item=>{
    const rad=item.angle*Math.PI/180;
    const ix=RAD_R*Math.cos(rad), iy=RAD_R*Math.sin(rad);
    const iG=menuG.append('g').attr('transform','translate('+ix+','+iy+')')
      .style('cursor','pointer')
      .on('click',e=>{ e.stopPropagation(); closeMenu(); handleMenu(item.key,id); });
    const r=isMobile()?28:22;
    const circ=iG.append('circle').attr('r',r).attr('fill',item.color).attr('stroke','#fff').attr('stroke-width',2);
    iG.on('mouseover',()=>circ.attr('r',r+3)).on('mouseout',()=>circ.attr('r',r));
    iG.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('fill','#fff').attr('font-size',isMobile()?'12px':'10px').attr('font-weight','700')
      .attr('pointer-events','none').text(item.label);
  });

  menuG.append('circle').attr('r',HR+1).attr('fill','#27ae60')
    .attr('stroke','#fff').attr('stroke-width',2.5).style('cursor','pointer')
    .on('click',function(e){ e.stopPropagation(); closeMenu(); handleMenu('edit',id); });
  menuG.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('fill','#fff').attr('font-size','13px').attr('font-weight','700')
    .attr('pointer-events','none').text('편집');
}

function closeMenu(){ d3.select('#canvas-g').selectAll('.radial-menu').remove(); }

function handleMenu(key,targetId){
  if(key==='edit'){ openEditModal(targetId); return; }
  if(key==='delete'){
    const m=S.data[S.tab].members.find(x=>x.id===targetId);
    if(m&&confirm(m.name+'을 삭제할까요?\n연결된 관계도 모두 삭제됩니다.')) doDeleteMember(targetId);
    return;
  }
  if(key==='spouse'){
    const {relations}=S.data[S.tab];
    if(relations.some(r=>r.relationType==='spouse'&&(r.person1Id===targetId||r.person2Id===targetId))){
      showToast('이미 배우자가 연결되어 있어요.',3500); return;
    }
  }
  if(key==='parent'){
    const {relations}=S.data[S.tab];
    if(relations.some(r=>r.relationType==='parent-child'&&r.person2Id===targetId)){
      showToast('이미 부모가 연결되어 있어요.',3500); return;
    }
  }
  const INFO={
    parent: {label:'부모 추가', defaultGender:'male'},
    spouse: {label:'배우자 추가',defaultGender:'female'},
    child:  {label:'자녀 추가', defaultGender:'male'},
    sibling:{label:'형제 추가', defaultGender:'male'},
  };
  openAddModal(targetId,key,INFO[key]);
}

function openEditModal(id){
  const m=S.data[S.tab].members.find(x=>x.id===id);

  document.getElementById('mm-id').value=m.id;

  document.getElementById('mm-rel-label').style.display='none';

function fillOrderUI(memberId){
  const tab=S.tab, members=S.data[tab].members;
  const group=document.getElementById('mm-order-group');
  const relations=S.data[tab].relations;
  const parentIds=relations
    .filter(r=>r.relationType==='parent-child'&&r.person2Id===memberId)
    .map(r=>r.person1Id);
  if(!parentIds.length){ group.style.display='none'; return; }
  const siblingIds=new Set();
  parentIds.forEach(pid=>{
    relations.filter(r=>r.relationType==='parent-child'&&r.person1Id===pid)
             .forEach(r=>siblingIds.add(r.person2Id));
  });
  siblingIds.add(memberId);
  const siblings=members.filter(m=>siblingIds.has(m.id)).sort((a,b)=>{
    const oa=(a.order!=null&&a.order!=='')?Number(a.order):members.indexOf(a)*10;
    const ob=(b.order!=null&&b.order!=='')?Number(b.order):members.indexOf(b)*10;
    return oa-ob;
  });
  if(siblings.length<=1){ group.style.display='none'; return; }
  S._orderSiblings=siblings.map(m=>m.id);
  const pos=S._orderSiblings.indexOf(memberId);
  document.getElementById('mm-order-label').textContent=(pos+1)+'번째 / '+siblings.length+'명';
  group.style.display='block';
}

async function shiftOrder(dir){
  const editId=document.getElementById('mm-id').value;
  const tab=S.tab, members=S.data[tab].members;
  const siblings=S._orderSiblings;
  if(!siblings||!editId) return;
  const pos=siblings.indexOf(editId), newPos=pos+dir;
  if(newPos<0||newPos>=siblings.length) return;
  const idA=siblings[pos], idB=siblings[newPos];
  const mA=members.find(m=>m.id===idA), mB=members.find(m=>m.id===idB);
  const orders=siblings.map((id,i)=>{ const m=members.find(x=>x.id===id); return(m&&m.order!=null&&m.order!=='')?Number(m.order):i*10; });
  const oA=orders[pos], oB=orders[newPos];
  mA.order=oB; mB.order=oA;
  siblings[pos]=idB; siblings[newPos]=idA;
  S._orderSiblings=siblings;
  document.getElementById('mm-order-label').textContent=(siblings.indexOf(editId)+1)+'번째 / '+siblings.length+'명';
  try{
    await api({action:'updateMember',data:{id:idA,order:String(mA.order)}});
    await api({action:'updateMember',data:{id:idB,order:String(mB.order)}});
    clearCache(); renderTree();
  }catch(e){ showToast('저장 실패: '+e.message,3000); }
}

async function applySpouseChange(memberId,tab){
  const sg=document.getElementById('mm-spouse-group');
  if(sg.style.display==='none') return;
  const newSpouseId=document.getElementById('mm-spouse-select').value;
  const relations=S.data[tab].relations;
  const existingRel=relations.find(r=>r.relationType==='spouse'&&(r.person1Id===memberId||r.person2Id===memberId));
  const currentSpouseId=existingRel?(existingRel.person1Id===memberId?existingRel.person2Id:existingRel.person1Id):'';
  if(newSpouseId===currentSpouseId) return;
  if(existingRel){
    await api({action:'deleteRelation',id:existingRel.id});
    S.data[tab].relations=relations.filter(r=>r.id!==existingRel.id);
  }
  if(newSpouseId){
    const res=await api({action:'addRelation',data:{person1Id:memberId,person2Id:newSpouseId,relationType:'spouse',tab}});
    S.data[tab].relations.push({id:res.id,person1Id:memberId,person2Id:newSpouseId,relationType:'spouse',tab});
  }
}

function fillSpouseSelect(memberId){
  const group=document.getElementById('mm-spouse-group');
  const sel=document.getElementById('mm-spouse-select');
  const tab=S.tab, members=S.data[tab].members, relations=S.data[tab].relations;
  const spouseRel=relations.find(r=>r.relationType==='spouse'&&(r.person1Id===memberId||r.person2Id===memberId));
  const currentSpouseId=spouseRel?(spouseRel.person1Id===memberId?spouseRel.person2Id:spouseRel.person1Id):'';
  const usedAsSpouse={};
  relations.forEach(r=>{ if(r.relationType==='spouse'){ usedAsSpouse[r.person1Id]=true; usedAsSpouse[r.person2Id]=true; } });
  sel.innerHTML='<option value="">— 없음 —</option>';
  members.forEach(m=>{
    if(m.id===memberId) return;
    if(usedAsSpouse[m.id]&&m.id!==currentSpouseId) return;
    const opt=document.createElement('option');
    opt.value=m.id; opt.textContent=m.name||'(이름없음)';
    if(m.id===currentSpouseId) opt.selected=true;
    sel.appendChild(opt);
  });
  group.style.display='block';
}

function renderRelSection(memberId){
  const {members,relations}=S.data[S.tab];
  const mMap=Object.fromEntries(members.map(m=>[m.id,m]));
  const myRels=relations.filter(r=>r.person1Id===memberId||r.person2Id===memberId);
  const section=document.getElementById('mm-rel-section');
  const listEl=document.getElementById('mm-rel-list');
  if(!myRels.length){ section.style.display='none'; return; }
  section.style.display='block';
  listEl.onclick=e=>{ const btn=e.target.closest('[data-relid]'); if(btn) unlinkRelation(btn.dataset.relid); };
  listEl.innerHTML=myRels.map(r=>{
    const other=r.person1Id===memberId?r.person2Id:r.person1Id;
    const otherM=mMap[other];
    const typeLabel={'spouse':'배우자','parent-child':r.person1Id===memberId?'부모→자녀':'자녀←부모','sibling':'형제'}[r.relationType]||r.relationType;
    return '<div class="rel-list-item"><span class="rel-tag">'+typeLabel+'</span><span>'+(otherM?.name||'(알 수 없음)')+'</span><button class="btn-unlink" data-relid="'+r.id+'" title="관계 삭제">✕</button></div>';
  }).join('');
}

async function unlinkRelation(relId){
  if(!confirm('이 관계를 삭제할까요?')) return;
  const tab=S.tab;
  showLoading();
  try{ await api({action:'deleteRelation',id:relId}); }catch(_){}
  S.data[tab].relations=S.data[tab].relations.filter(r=>r.id!==relId);
  clearCache();
  const editId=document.getElementById('mm-id').value;
  if(editId) renderRelSection(editId);
  hideLoading(); renderTree(); showToast('관계를 삭제했습니다.');
}

function openSelfModal(){
  const sid=S.selfId[S.tab];
  if(sid) openEditModal(sid);
  else showToast('"나"로 설정된 인물이 없어요.',3000);
}
function closeMemberModal(){ document.getElementById('member-modal').classList.remove('open'); }

async function saveMember(){
  const name=document.getElementById('mm-name').value.trim();
  if(!name){ showToast('이름을 입력해 주세요.'); return; }
  const birthVal=parseInt(document.getElementById('mm-birth').value,10);
  const thisYear=new Date().getFullYear();
  if(document.getElementById('mm-birth').value&&(isNaN(birthVal)||birthVal<1||birthVal>thisYear)){
    showToast('출생년도는 1~'+thisYear+' 사이로 입력해 주세요.'); return;
  }
  const editId=document.getElementById('mm-id').value;
  const relKey=document.getElementById('mm-rel-type').value;
  const relTarget=document.getElementById('mm-rel-target').value;
  const isSelf=document.getElementById('mm-self').checked;
  const isDead=document.getElementById('mm-dead').checked;
  const tab=S.tab;

  if(isSelf&&S.selfId[tab]&&S.selfId[tab]!==editId){
    const om=S.data[tab].members.find(m=>m.id===S.selfId[tab]);
    if(om){ om.isSelf='false'; try{ await api({action:'updateMember',data:{...om}}); }catch(_){} }
  }

  let photoFileId=S._photoFileId||null;
  if(S._pendingPhotoB64){
    showLoading(); closeMemberModal();
    try{
      const upRes=await api({action:'uploadPhoto',base64:S._pendingPhotoB64,mime:S._pendingPhotoMime||'image/jpeg',name:(name||'photo')+'_'+Date.now()});
      photoFileId=upRes.fileId;
      if(S._photoFileId&&S._photoFileId!==photoFileId){ try{ await api({action:'deletePhoto',fileId:S._photoFileId}); }catch(_){} }
    }catch(e){ showToast('사진 업로드 실패: '+e.message,3000); hideLoading(); return; }
  } else if(S._photoRemoved&&S._photoFileId){
    try{ await api({action:'deletePhoto',fileId:S._photoFileId}); }catch(_){}
    photoFileId=null;
  }

  const data={name,gender:S.gender,birthYear:document.getElementById('mm-birth').value,deathYear:'',note:document.getElementById('mm-note').value.trim(),tab,isSelf:String(isSelf),isDead:String(isDead),photoFileId:photoFileId||''};
  if(!S._pendingPhotoB64){ showLoading(); closeMemberModal(); }

  try{
    if(editId){
      data.id=editId;
      await api({action:'updateMember',data});
      const idx=S.data[tab].members.findIndex(m=>m.id===editId);
      if(idx>=0) S.data[tab].members[idx]={...S.data[tab].members[idx],...data};
      if(isSelf) S.selfId[tab]=editId;
      else if(S.selfId[tab]===editId) S.selfId[tab]=null;
      await applySpouseChange(editId,tab);
    } else {
      const res=await api({action:'addMember',data});
      const newId=res.id;
      S.data[tab].members.push({id:newId,...data});
      if(isSelf) S.selfId[tab]=newId;
      if(relKey&&relTarget) await doLinkRelation(relKey,relTarget,newId,tab);
    }
    clearCache();
    showToast(editId?'수정했습니다.':'추가했습니다.');
  }catch(err){
    showToast('저장 실패: '+(err.message||'서버 오류'));
    hideLoading(); return;
  }finally{ hideLoading(); renderTree(); }
}

// ── 관계 연결 ──────────────────────────────────────
async function doLinkRelation(relKey,targetId,newId,tab){
  const ro=buildRelObj(relKey,targetId,newId,tab);
  if(!ro) return;
  const res=await api({action:'addRelation',data:ro});
  S.data[tab].relations.push({id:res.id,...ro});

  // 형제 추가 시: 공통 부모의 parent-child만 추가 (sibling 행은 저장하지 않음)
  if(relKey==='sibling'){
    const parentRels=S.data[tab].relations.filter(r=>r.relationType==='parent-child'&&r.person2Id===targetId);
    for(const pr of parentRels){
      // 이미 연결돼있으면 skip
      const already=S.data[tab].relations.some(r=>r.relationType==='parent-child'&&r.person1Id===pr.person1Id&&r.person2Id===newId);
      if(already) continue;
      const pr2={person1Id:pr.person1Id,person2Id:newId,relationType:'parent-child',tab};
      try{ const r2=await api({action:'addRelation',data:pr2}); S.data[tab].relations.push({id:r2.id,...pr2}); }
      catch(_){ S.data[tab].relations.push({id:'L_'+Date.now(),...pr2}); }
    }
  }
}

function buildRelObj(relKey,targetId,newId,tab){
  const MAP={
    parent: {person1Id:newId,    person2Id:targetId,relationType:'parent-child'},
    spouse: {person1Id:targetId, person2Id:newId,   relationType:'spouse'},
    child:  {person1Id:targetId, person2Id:newId,   relationType:'parent-child'},
    sibling:{person1Id:targetId, person2Id:newId,   relationType:'sibling'},
  };
  const r=MAP[relKey]; return r?{...r,tab}:null;
}

async function deleteFromModal(){
  const id=document.getElementById('mm-id').value;
  const m=S.data[S.tab].members.find(x=>x.id===id);
  if(!m||!confirm(m.name+'을 삭제할까요?\n연결된 관계도 모두 삭제됩니다.')) return;
  closeMemberModal(); await doDeleteMember(id);
}
async function doDeleteMember(id){
  showLoading();
  try{ await api({action:'deleteMember',id}); }catch(_){}
  const tab=S.tab;
  S.data[tab].members  =S.data[tab].members.filter(x=>x.id!==id);
  S.data[tab].relations=S.data[tab].relations.filter(r=>r.person1Id!==id&&r.person2Id!==id);
  if(S.selfId[tab]===id) S.selfId[tab]=null;
  clearCache(); hideLoading(); renderTree(); showToast('삭제했습니다.');
}

// ══════════════════════════════════════════════════
// 사진
// ══════════════════════════════════════════════════
function initPhotoListeners(){
  if(initPhotoListeners._done) return; initPhotoListeners._done=true;
  document.getElementById('mm-photo-wrap').addEventListener('click',()=>document.getElementById('mm-photo-file').click());
  document.getElementById('mm-photo-file').addEventListener('change',function(){ onPhotoFileChange(this); });
  document.getElementById('mm-photo-clear').addEventListener('click',function(e){ e.stopPropagation(); removePhoto(); });
}
function resetPhotoUI(){
  initPhotoListeners();
  S._pendingPhotoB64=null; S._pendingPhotoMime=null; S._photoFileId=null; S._photoRemoved=false;
  document.getElementById('mm-photo-file').value='';
  document.getElementById('mm-photo-thumb').src='';
  document.getElementById('mm-photo-thumb').style.display='none';
  document.getElementById('mm-photo-icon').style.display='block';
  document.getElementById('mm-photo-main').textContent='사진 추가';
  document.getElementById('mm-photo-clear').style.display='none';
}
function onPhotoFileChange(input){
  const file=input.files[0]; if(!file) return;
  if(file.size>5*1024*1024){ showToast('사진은 5MB 이하만 가능해요.',3000); return; }
  const reader=new FileReader();
  reader.onload=e=>{
    const dataUrl=e.target.result;
    const [meta,b64]=dataUrl.split(',');
    const mime=meta.match(/:(.*?);/)[1];
    S._pendingPhotoB64=b64; S._pendingPhotoMime=mime; S._photoRemoved=false;
    document.getElementById('mm-photo-thumb').src=dataUrl;
    document.getElementById('mm-photo-thumb').style.display='block';
    document.getElementById('mm-photo-icon').style.display='none';
    document.getElementById('mm-photo-main').textContent='사진 선택됨 (저장 시 업로드)';
    document.getElementById('mm-photo-clear').style.display='block';
  };
  reader.readAsDataURL(file);
}
function removePhoto(){
  S._pendingPhotoB64=null; S._pendingPhotoMime=null; S._photoRemoved=true;
  document.getElementById('mm-photo-file').value='';
  document.getElementById('mm-photo-thumb').style.display='none';
  document.getElementById('mm-photo-icon').style.display='block';
  document.getElementById('mm-photo-main').textContent='사진 추가';
  document.getElementById('mm-photo-clear').style.display='none';
}

// ══════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════
async function api(payload){
  if(!SCRIPT_URL||SCRIPT_URL.includes('YOUR_GAS')) throw new Error('GAS URL이 설정되지 않았습니다.');
  const res=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
  if(!res.ok) throw new Error('서버 응답 오류: '+res.status);
  const json=await res.json();
  if(!json.success) throw new Error(json.error||'서버 오류');
  return json.data;
}

// ══════════════════════════════════════════════════
// UI 유틸
// ══════════════════════════════════════════════════
function showLoading(){ document.getElementById('loading').style.display='flex'; }
function hideLoading(){ document.getElementById('loading').style.display='none'; }
let _tt;
function showToast(msg,ms=2400){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),ms);
}
